<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Game Rental System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <h1>🎮 Game Rental System - Admin</h1>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="games.html">Games</a>
        <a href="myrentals.html">My Rentals</a>
        <button id="logoutBtn" class="btn btn-secondary">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="admin-tabs">
      <button class="tab-btn active" data-tab="games-tab">Games Management</button>
      <button class="tab-btn" data-tab="rentals-tab">Rentals Overview</button>
    </div>

    <div id="games-tab" class="tab-content active">
      <div class="admin-section">
        <h2>Games Management</h2>
        <button id="addGameBtn" class="btn btn-primary">Add New Game</button>
        <div id="message" class="message"></div>

        <div id="gameForm" class="game-form" style="display: none;">
          <h3 id="formTitle">Add New Game</h3>
          <form>
            <div class="form-group">
              <label for="title">Title</label>
              <input type="text" id="title" required>
            </div>
            <div class="form-group">
              <label for="platform">Platform</label>
              <input type="text" id="platform" required>
            </div>
            <div class="form-group">
              <label for="genre">Genre</label>
              <input type="text" id="genre" required>
            </div>
            <div class="form-group">
              <label for="pegi">PEGI</label>
              <select id="pegi" required>
                <option value="">Select PEGI</option>
                <option value="3">3</option>
                <option value="7">7</option>
                <option value="12">12</option>
                <option value="16">16</option>
                <option value="18">18</option>
              </select>
            </div>
            <div class="form-group">
              <label for="description">Description</label>
              <textarea id="description"></textarea>
            </div>
            <div class="form-group">
              <label for="stock_total">Stock Total</label>
              <input type="number" id="stock_total" min="0" required>
            </div>
            <div class="button-group">
              <button type="submit" class="btn btn-primary">Save</button>
              <button type="button" class="btn btn-secondary" onclick="document.getElementById('gameForm').style.display='none'">Cancel</button>
            </div>
          </form>
        </div>

        <div id="gamesContainer" class="games-grid"></div>
      </div>
    </div>

    <div id="rentals-tab" class="tab-content">
      <div class="admin-section">
        <h2>Rentals Overview</h2>
        <div id="rentalsContainer" class="rentals-grid"></div>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Game Rental System. All rights reserved.</p>
  </footer>

  <script>
    // Check authentication
    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('token');
      const role = localStorage.getItem('user_role');
      const logoutBtn = document.getElementById('logoutBtn');

      if (!token || role !== 'ADMIN') {
        window.location.href = 'index.html';
        return;
      }

      logoutBtn.addEventListener('click', () => {
        localStorage.clear();
        window.location.href = 'index.html';
      });
    });
  </script>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
